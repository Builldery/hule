services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017/hule
      PORT: "3000"
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3100:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_PROXY: http://api:3000
    depends_on:
      - api
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  mongo_data:
